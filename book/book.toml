[book]
title = "sndlab"
description = "A TUI sound-design environment with live Rhai scripting, Kira playback, and AI collaboration over MCP."
authors = ["Chris Dawes"]
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/cmsd2/sndlab"
edit-url-template = "https://github.com/cmsd2/sndlab/edit/master/book/{path}"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
